upstream api {
  server api:4000;
}

server {
  listen 80;
  client_max_body_size 0;

  # API proxy (must be before static files)
  location /api {
    resolver 127.0.0.11 valid=30s;
    set $docker_host "api";
    proxy_pass http://$docker_host:4000;
    proxy_connect_timeout 30s;
    proxy_read_timeout 60s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  # Proxy uploads (served statically by the API) - must be before static file rules
  location ^~ /uploads/ {
    resolver 127.0.0.11;
    set $docker_host "api";
    proxy_pass http://$docker_host:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # OpenStreetMap Nominatim geocoding (same path as Vite dev proxy)
  location ^~ /nominatim {
    rewrite ^/nominatim/?(.*)$ /$1 break;
    proxy_pass https://nominatim.openstreetmap.org;
    proxy_ssl_server_name on;
    proxy_set_header Host nominatim.openstreetmap.org;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header User-Agent "TickaHub-EventOrganizer/1.0";
    proxy_set_header Accept-Language "en";
  }

  # No cache for index.html (must always fetch fresh)
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires 0 always;
  }

  # Long-term cache for static assets (with Vite's hashed filenames)
  location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|json|wasm)$ {
    root /usr/share/nginx/html;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  # React / Vite frontend (must be last as catch-all)
  location / {
    root   /usr/share/nginx/html;
    index  index.html;
    try_files $uri /index.html;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
